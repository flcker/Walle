name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# 允许 workflow 写入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行，新推送会取消正在进行的旧任务
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 保留完整 Git 历史，支持文章日期兜底读取 commit 时间
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Walle/package-lock.json

      - name: Install dependencies
        working-directory: Walle
        run: npm ci

      - name: Build
        working-directory: Walle
        # 仓库名作为 basePath（用户主页仓库 username.github.io 时留空即可）
        # 示例：NEXT_PUBLIC_BASE_PATH=/my-blog
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
        run: npm run build
        # prebuild 钩子会自动生成 public/search-index.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Walle/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
